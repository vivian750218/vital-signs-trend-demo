
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); font-size: 14px; color: var(--color-text-primary); }
  .top-bar { background: #2B9E8C; color: white; padding: 12px 16px; display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 500; border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0; }
  .top-bar .back { font-size: 18px; cursor: pointer; margin-right: 4px; }
  .breadcrumb { font-size: 13px; opacity: 0.85; }
  .page-body { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 0 0 var(--border-radius-lg) var(--border-radius-lg); padding: 0; }
  .tab-bar { display: flex; border-bottom: 0.5px solid var(--color-border-tertiary); padding: 0 16px; }
  .tab { padding: 12px 20px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--color-text-secondary); transition: color 0.15s; user-select: none; }
  .tab.active { color: #2B9E8C; border-bottom: 2px solid #2B9E8C; font-weight: 500; }
  .tab:hover:not(.active) { color: var(--color-text-primary); }
  .content { padding: 16px; }
  .filter-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-label { font-size: 13px; color: var(--color-text-secondary); }
  .date-input { border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 5px 10px; font-size: 13px; color: var(--color-text-primary); background: var(--color-background-secondary); }
  .metric-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { padding: 4px 12px; border-radius: 999px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--color-border-secondary); color: var(--color-text-secondary); background: transparent; user-select: none; transition: all 0.1s; }
  .chip.on { background: #E1F5EE; border-color: #2B9E8C; color: #0F6E56; font-weight: 500; }
  .chart-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px; margin-bottom: 14px; }
  .chart-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .chart-title .unit { font-weight: 400; font-size: 12px; color: var(--color-text-tertiary); }
  .chart-area { position: relative; height: 120px; }
  .legend { display: flex; gap: 12px; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
  .legend-dot { width: 10px; height: 3px; border-radius: 2px; }
  .page-list { display: none; }
  svg text { font-family: var(--font-sans); }
</style>

<script>
function switchTab(tab) {
  document.getElementById('tab-list').classList.toggle('active', tab === 'list');
  document.getElementById('tab-trend').classList.toggle('active', tab === 'trend');
  document.getElementById('pane-list').style.display = tab === 'list' ? 'block' : 'none';
  document.getElementById('pane-trend').style.display = tab === 'trend' ? 'block' : 'none';
}
function toggleChip(el) {
  el.classList.toggle('on');
  const map = { '體溫': 'card-temp', '血壓': 'card-bp', '脈搏': 'card-pulse' };
  const card = map[el.textContent];
  if (card) document.getElementById(card).style.display = el.classList.contains('on') ? 'block' : 'none';
}
</script>
